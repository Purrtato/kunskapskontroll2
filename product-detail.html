<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Google Fonts: Playfair Display + Lato -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Gemensam CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- detail CSS -->
    <link rel="stylesheet" href="css/product-detail.css" />

    <title>Produktdetalj – SmartMat</title>
  </head>
  <body>
    <!-- Navigations menu -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">SmartMat</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Hem</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="recipes.html">Recept</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="promotions.html">Erbjudanden</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <!-- so the user goes back to promotion page -->
      <a href="promotions.html" class="back-link mb-4 d-inline-block">
        ← Tillbaka till erbjudanden
      </a>

      <!-- Loading state -->
      <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Laddar...</span>
        </div>
        <p class="mt-3 text-muted">Hämtar produktinformation...</p>
      </div>

      <!-- Error state -->
      <div id="errorState" class="d-none">
        <div class="alert alert-warning">
          Kunde inte hitta produkten.
          <a href="promotions.html">Gå tillbaka till erbjudanden.</a>
        </div>
      </div>

      <!-- Product content (hidden until loaded) -->
      <div id="productContent" class="d-none">
        <!-- Produkt bild + info -->
        <div class="row align-items-start mb-4">
          <div class="col-md-5 mb-4 mb-md-0">
            <img id="productImage" src="" alt="" class="product-img" />
          </div>
          <div class="col-md-7">
            <span
              id="discountBadge"
              class="offer-badge mb-2 d-inline-block"
            ></span>
            <h1 id="productName"></h1>
            <p id="productBrand" class="text-muted mb-2"></p>
            <p id="productDescription" class="mb-4"></p>

            <div class="price-box mb-4">
              <span class="price-label">Erbjudandepris</span>
              <span id="productPrice" class="price-value"></span>
              <span id="productOriginalPrice" class="price-original"></span>
            </div>

            <div class="store-info">
              <span class="store-label">Butik:</span>
              <span id="storeName" class="store-value"></span>
            </div>
            <div class="store-info mt-1">
              <span class="store-label">Gäller:</span>
              <span id="validDates" class="store-value"></span>
            </div>
          </div>
        </div>

        <hr class="section-divider" />

        <!-- Näringsvärden -->
        <div class="mt-2 mb-5">
          <h3 class="mb-4">
            Näringsvärden
            <small class="text-muted" style="font-size: 0.9rem">per 100g</small>
          </h3>
          <div id="nutritionContent">
            <!-- fylls av JS -->
          </div>
        </div>

        <hr class="section-divider" />

        <!-- Recept som använder denna ingrediens -->
        <div class="mt-2">
          <h3 class="mb-4">Recept med denna ingrediens</h3>
          <div id="relatedRecipes" class="row">
            <!-- fylls av JS -->
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="src/product-detail.js"></script>
  </body>
</html>
