<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Google Fonts: Playfair Display + Lato -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Gemensam CSS -->
     <link rel="stylesheet" href="css/style.css">

     <!-- Sidspecifikt CSS -->
    <link rel="stylesheet" href="css/recipes.css">
    
    <title>Recept</title>
</head>
<body> 
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">SmartMat</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Hem</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="recipes.html">Recept</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="promotions.html">Erbjudanden</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
 
        <!-- Bild + titel -->
        <div class="row">
            <div class="col-12">
                <img id="recipe-image" class="hero-img mb-4" alt="Receptbild">
                <h1 id="recipe-name"></h1>
                <p id="recipe-description" class="text-muted mb-3"></p>
                <button type="button" id="favoriteBtn">
                    <span id="heartIcon" class="heart">♡</span> Spara
                </button>
            </div>
        </div>
 
        <hr class="section-divider">
 
        <!-- Ingredienser + Instruktioner -->
        <div class="row mt-2">
            <div class="col-md-4 mb-4">
                <h4 class="mb-3">Ingredienser</h4>
                <ul id="ingredient-list" class="list-group"></ul>
            </div>
            <div class="col-md-8">
                <h4 class="mb-3">Instruktioner</h4>
                <div id="instructions-container"></div>
            </div>
        </div>
 
        <hr class="section-divider">
 
        <!-- Erbjudanden -->
        <div class="mt-2">
            <h3 class="mb-4">Erbjudanden</h3>
            <div id="promotions-container" class="row"></div>
        </div>
 
        <hr class="section-divider">
 
        <!-- Recensioner – hårdkodade, inget API -->
        <div class="mt-2">
            <h3 class="mb-4">Recensioner</h3>
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="review-author mb-1">Anna</p>
                        <p class="review-text mb-0">Supergod! Kommer laga igen 😍</p>
                    </div>
                    <span class="star-badge">⭐ 5</span>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="review-author mb-1">Erik</p>
                        <p class="review-text mb-0">Enkelt och gott!</p>
                    </div>
                    <span class="star-badge">⭐ 4</span>
                </div>
            </div>
        </div>
 
    </div>
    <script type="module" src="src/recipe-page.js"></script>
</body>
</html>
