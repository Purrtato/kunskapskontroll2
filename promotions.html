<!doctype html>
<html lang="sv">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Google Fonts: Playfair Display + Lato -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Gemensam CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Sidspecifikt CSS -->
    <link rel="stylesheet" href="css/promotions.css" />
  </head>

  <body>
    <!-- Navigationsmeny -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">SmartMat</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Hem</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="recipes.html">Recept</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="promotions.html">Erbjudanden</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Bild + titel -->
    <div class="container my-5">
      <div class="row">
        <div class="col-12">
          <img
            src="images/hero-promotions-page.webp"
            class="hero-img mb-4"
            alt="Mat erbjudanden"
          />
          <div class="col text-center">
            <h1 class="">Erbjudanden</h1>
          </div>
        </div>
      </div>

      <!-- Filtersektion -->
      <div class="row">
        <div id="filters" class="row g-3 mb-4">
          <div class="col-md-6">
            <label for="storeFilter" class="form-label">Butik</label>
            <select id="storeFilter" class="form-select">
              <option value="">Alla butiker</option>
              <option value="1">ICA</option>
              <option value="2">Coop</option>
              <option value="3">Willys</option>
              <option value="4">Lidl</option>
              <option value="5">Hemköp</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="categoryFilter" class="form-label">Kategori</label>
            <select id="categoryFilter" class="form-select">
              <option value="">Alla kategorier</option>
              <option value="1">Mejeri</option>
              <option value="2">Kött</option>
              <option value="3">Fisk & Skaldjur</option>
              <option value="4">Frukt</option>
              <option value="5">Grönsaker</option>
              <option value="6">Frysvaror</option>
              <option value="7">Bröd & Bageri</option>
              <option value="8">Dryck</option>
              <option value="9">Skafferi</option>
              <option value="10">Snacks & Godis</option>
              <option value="11">Vegetariskt</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div id="promotion-container">
          <!-- Här kommer erbjudandena att visas dynamiskt via JavaScript -->
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="src/promotions.js"></script>
  </body>
</html>
